name: Publish

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libvulkan-dev

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p kozan-primitives
          sleep 30
          cargo publish -p kozan-macros
          sleep 30
          cargo publish -p kozan-core
          sleep 30
          cargo publish -p kozan-scheduler
          sleep 30
          cargo publish -p kozan-platform
          sleep 30
          cargo publish -p kozan-vello
          sleep 30
          cargo publish -p kozan-winit
          sleep 30
          cargo publish -p kozan
